name: CI & Deploy to PM2

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy to PM2 via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT || '22' }}
          PORTFOLIO_PATH: ${{ secrets.PORTFOLIO_PATH || '/home/ubuntu/repositories/next-portfolio' }}
          PORTFOLIO_PROCESS_NAME: ${{ secrets.PORTFOLIO_PROCESS_NAME || 'portfolio' }}
        run: |
          set -euo pipefail
          if [ -z "${SERVER_HOST}" ] || [ -z "${SERVER_USER}" ] || [ -z "${SERVER_SSH_KEY}" ]; then
            echo "Missing SERVER_HOST/SERVER_USER/SERVER_SSH_KEY secrets"
            exit 1
          fi

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -p ${SERVER_SSH_PORT}"
          export GIT_SSH_COMMAND="ssh ${SSH_OPTS} -i <(printf '%s' '$SERVER_SSH_KEY')"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh ${SSH_OPTS} -i ~/.ssh/deploy_key "${SERVER_USER}@${SERVER_HOST}" \
            "bash -lc 'set -e; cd \"${PORTFOLIO_PATH}\"; git pull; npm ci --no-audit --no-fund; npm run build; command -v pm2 >/dev/null 2>&1 || { echo \"PM2 not found on server\"; exit 1; }; pm2 restart ${PORTFOLIO_PROCESS_NAME} --update-env; pm2 list'"
