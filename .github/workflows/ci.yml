name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  optional-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Trigger auto-deploy webhook
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not set"
            exit 1
          fi
          if command -v curl >/dev/null 2>&1; then
            curl -sS -X POST "${WEBHOOK_URL}" \
              -H 'Content-Type: application/json' \
              -d "$(jq -c --arg ref 'refs/heads/master' '{ref:$ref}')"
          else
            echo "curl is required for webhook trigger"
            exit 1
          fi
